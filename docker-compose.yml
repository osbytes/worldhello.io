# Local Postgres for dev. ltree extension ships with the official image; the
# migration runs `CREATE EXTENSION ltree`. Prod uses Neon (serverless driver).
services:
  db:
    image: postgres:17-alpine
    container_name: worldhello-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: worldhello
      POSTGRES_PASSWORD: worldhello
      POSTGRES_DB: worldhello
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldhello -d worldhello"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
